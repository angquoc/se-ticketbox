services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketbox-postgres
    environment:
      POSTGRES_USER: ticketbox_user
      POSTGRES_PASSWORD: ticketbox_password
      POSTGRES_DB: ticketbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ticketbox-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: ticketbox-minio
    environment:
      MINIO_ROOT_USER: ticketbox_admin
      MINIO_ROOT_PASSWORD: ticketbox_password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data: