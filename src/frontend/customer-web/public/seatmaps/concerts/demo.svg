<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" role="img" aria-label="Sơ đồ khu vực ghế">
  <rect width="800" height="580" fill="#f8fafc"/>

  <!-- SÂN KHẤU CHÍNH -->
  <rect x="220" y="20" width="360" height="60" rx="10" fill="#1e293b"/>
  <text x="400" y="55" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="system-ui,sans-serif">SÂN KHẤU CHÍNH / MAIN STAGE</text>
  
  <line x1="50" y1="95" x2="750" y2="95" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="400" y="112" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Lối kỹ thuật / Khoảng cách an toàn</text>

  <!-- BACKGROUND DECORATIONS (Tầm nhìn trực diện & hai cánh) -->
  <!-- SVIP (Center Front - Sát sân khấu, trực diện) -->
  <rect x="280" y="130" width="240" height="110" rx="8" fill="#FEE2E2" opacity="0.68" stroke="#EF4444" stroke-width="1.5"/>
  <text x="400" y="180" text-anchor="middle" fill="#991B1B" font-size="13" font-weight="700" font-family="system-ui,sans-serif">SVIP (CENTER FRONT)</text>
  <text x="400" y="200" text-anchor="middle" fill="#B91C1C" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Cận cảnh - Tầm nhìn trực diện tốt nhất</text>

  <!-- VIP Left (Left Front - Sát sân khấu bên trái) -->
  <rect x="50" y="130" width="210" height="110" rx="8" fill="#FEF3C7" opacity="0.68" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="155" y="180" text-anchor="middle" fill="#92400E" font-size="13" font-weight="700" font-family="system-ui,sans-serif">VIP (LEFT WING)</text>
  <text x="155" y="200" text-anchor="middle" fill="#B45309" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Tầm nhìn chéo trái</text>

  <!-- VIP Right (Right Front - Sát sân khấu bên phải) -->
  <rect x="540" y="130" width="210" height="110" rx="8" fill="#FEF3C7" opacity="0.68" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="645" y="180" text-anchor="middle" fill="#92400E" font-size="13" font-weight="700" font-family="system-ui,sans-serif">VIP (RIGHT WING)</text>
  <text x="645" y="200" text-anchor="middle" fill="#B45309" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Tầm nhìn chéo phải</text>

  <!-- CAT1 (Center Middle - Giữa sân khấu trực diện) -->
  <rect x="240" y="260" width="320" height="110" rx="8" fill="#DBEAFE" opacity="0.68" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="310" text-anchor="middle" fill="#1D4ED8" font-size="13" font-weight="700" font-family="system-ui,sans-serif">CAT 1 (CENTER MIDDLE)</text>
  <text x="400" y="330" text-anchor="middle" fill="#2563EB" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Trực diện - Tầm nhìn bao quát sân khấu</text>

  <!-- CAT2 Left (Left Middle) -->
  <rect x="50" y="260" width="170" height="110" rx="8" fill="#E0E7FF" opacity="0.68" stroke="#6366F1" stroke-width="1.5"/>
  <text x="135" y="310" text-anchor="middle" fill="#3730A3" font-size="13" font-weight="700" font-family="system-ui,sans-serif">CAT 2 (LEFT)</text>
  <text x="135" y="330" text-anchor="middle" fill="#4F46E5" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Góc xiên trung tâm</text>

  <!-- CAT2 Right (Right Middle) -->
  <rect x="580" y="260" width="170" height="110" rx="8" fill="#E0E7FF" opacity="0.68" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="310" text-anchor="middle" fill="#3730A3" font-size="13" font-weight="700" font-family="system-ui,sans-serif">CAT 2 (RIGHT)</text>
  <text x="665" y="330" text-anchor="middle" fill="#4F46E5" font-size="10" font-weight="500" font-family="system-ui,sans-serif">Góc xiên trung tâm</text>

  <!-- GA (General Admission - Đứng rộng rãi cuối cùng) -->
  <rect x="50" y="390" width="700" height="130" rx="8" fill="#DCFCE7" opacity="0.68" stroke="#22C55E" stroke-width="1.5"/>
  <text x="400" y="445" text-anchor="middle" fill="#166534" font-size="14" font-weight="700" font-family="system-ui,sans-serif">GA (GENERAL ADMISSION - STANDING ZONE)</text>
  <text x="400" y="470" text-anchor="middle" fill="#15803D" font-size="11" font-weight="500" font-family="system-ui,sans-serif">Không gian tự do - Khu vực đứng sôi động nhất phía sau</text>

  <!-- Trục phân cách -->
  <line x1="400" y1="130" x2="400" y2="520" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 8"/>
  <text x="400" y="540" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Trục đối xứng trung tâm</text>

  <g id="zones" aria-label="Khu vực ghế">
    <rect data-zone="svip" data-zone-name="SVIP (Center Front)" data-ticket-type="SVIP" x="280" y="130" width="240" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="vip-left" data-zone-name="VIP (Left Wing)" data-ticket-type="VIP" x="50" y="130" width="210" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="vip-right" data-zone-name="VIP (Right Wing)" data-ticket-type="VIP" x="540" y="130" width="210" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="cat1" data-zone-name="CAT1 (Center Middle)" data-ticket-type="CAT1" x="240" y="260" width="320" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="cat2-left" data-zone-name="CAT2 (Left Middle)" data-ticket-type="CAT2" x="50" y="260" width="170" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="cat2-right" data-zone-name="CAT2 (Right Middle)" data-ticket-type="CAT2" x="580" y="260" width="170" height="110" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
    <rect data-zone="ga" data-zone-name="GA (General Admission)" data-ticket-type="GA" x="50" y="390" width="700" height="130" rx="8" fill="#4CAF50" stroke="transparent" stroke-width="2" class="zone"/>
  </g>
</svg>
