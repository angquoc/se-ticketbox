<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-labelledby="title desc">
  <title id="title">Summer Music Festival 2026 seat map background</title>
  <desc id="desc">Concert layout with a stage at the top, Platinum centered near the stage, Gold on the left, Silver on the right, and General Admission at the back.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#262B3A"/>
      <stop offset="100%" stop-color="#10131D"/>
    </linearGradient>
    <linearGradient id="platinumGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF4FF"/>
      <stop offset="100%" stop-color="#B8D8FF"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF2B8"/>
      <stop offset="100%" stop-color="#FFD15A"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F3F6"/>
      <stop offset="100%" stop-color="#B8C0CC"/>
    </linearGradient>
    <linearGradient id="generalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DDF7E5"/>
      <stop offset="100%" stop-color="#8DD9A2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="#F7F8FC"/>
  <rect x="25" y="25" width="750" height="750" rx="34" fill="#FFFFFF" stroke="#DFE3ED" stroke-width="2"/>

  <g id="stage" filter="url(#softShadow)">
    <path d="M245 64 H555 Q585 64 585 94 V132 Q585 162 555 162 H245 Q215 162 215 132 V94 Q215 64 245 64 Z" fill="url(#stageGrad)"/>
    <text x="400" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">STAGE</text>
    <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C8D0E3">MAIN PERFORMANCE AREA</text>
  </g>

  <g id="walkways" opacity="0.45">
    <path d="M390 168 V586" stroke="#CBD2DF" stroke-width="12" stroke-linecap="round" stroke-dasharray="12 18"/>
    <path d="M400 526 C400 560 400 575 400 586" stroke="#CBD2DF" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g id="zone-platinum" filter="url(#softShadow)">
    <rect x="250" y="186" width="300" height="142" rx="24" fill="url(#platinumGrad)" stroke="#6CA8E8" stroke-width="3"/>
    <text x="400" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#245B99">PLATINUM</text>
    <text x="400" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#245B99" opacity="0.72">PLT SEATS</text>
  </g>

  <g id="zone-gold" filter="url(#softShadow)">
    <rect x="70" y="370" width="318" height="160" rx="24" fill="url(#goldGrad)" stroke="#D6A313" stroke-width="3"/>
    <text x="229" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7A5900">GOLD</text>
    <text x="229" y="511" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#7A5900" opacity="0.72">GLD SEATS</text>
  </g>

  <g id="zone-silver" filter="url(#softShadow)">
    <rect x="412" y="370" width="318" height="160" rx="24" fill="url(#silverGrad)" stroke="#8994A3" stroke-width="3"/>
    <text x="571" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#4C5666">SILVER</text>
    <text x="571" y="511" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4C5666" opacity="0.72">SLV SEATS</text>
  </g>

  <g id="zone-general" filter="url(#softShadow)">
    <rect x="100" y="606" width="600" height="132" rx="26" fill="url(#generalGrad)" stroke="#4DA967" stroke-width="3"/>
    <text x="400" y="637" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1F6B35">GENERAL ADMISSION</text>
    <text x="400" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1F6B35" opacity="0.72">GA SEATS</text>
  </g>

  <g id="legend" font-family="Arial, sans-serif" font-size="12" fill="#4B5565">
    <rect x="54" y="55" width="132" height="92" rx="16" fill="#FFFFFF" stroke="#E0E4EC"/>
    <circle cx="74" cy="80" r="7" fill="#B8D8FF" stroke="#6CA8E8"/>
    <text x="90" y="84">Platinum center</text>
    <circle cx="74" cy="105" r="7" fill="#FFD15A" stroke="#D6A313"/>
    <text x="90" y="109">Gold left</text>
    <circle cx="74" cy="130" r="7" fill="#B8C0CC" stroke="#8994A3"/>
    <text x="90" y="134">Silver right</text>
  </g>
</svg>
